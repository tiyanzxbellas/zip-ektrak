<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub ZIP Uploader</title>
    
    <!-- Load JSZip dari CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        h1 {
            color: #333;
            margin-bottom: 5px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-weight: 600;
            color: #555;
            margin-bottom: 5px;
            font-size: 14px;
        }
        
        input,
        select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        input:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .file-input {
            border: 2px dashed #ccc;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s;
            position: relative;
        }
        
        .file-input:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }
        
        .file-input input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }
        
        .file-name {
            margin-top: 10px;
            color: #667eea;
            font-weight: 500;
        }
        
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        #progress {
            margin-top: 20px;
            display: none;
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s;
        }
        
        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }
        
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .mode-hint {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }
        
        .footer {
            margin-top: 20px;
            text-align: center;
            color: #999;
            font-size: 12px;
        }
        
        .loading-dots::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }
        
        @keyframes dots {
            0% {
                content: '';
            }
            25% {
                content: '.';
            }
            50% {
                content: '..';
            }
            75% {
                content: '...';
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📦 GitHub Uploader</h1>
        <p class="subtitle">Upload ZIP langsung ke GitHub via API</p>

        <form id="uploadForm">
            <div class="form-group">
                <label>🔑 GitHub Token</label>
                <input type="password" id="token" placeholder="ghp_xxxxxxxxxxxx" required>
                <div class="mode-hint">
                    Buat di Settings → Developer settings → Personal access tokens (repo scope)
                </div>
            </div>

            <div class="form-group">
                <label>👤 Username</label>
                <input type="text" id="owner" placeholder="username_github" required>
            </div>

            <div class="form-group">
                <label>📁 Nama Repository</label>
                <input type="text" id="repo" placeholder="my-repo" required>
            </div>

            <div class="form-group">
                <label>🔄 Mode</label>
                <select id="mode">
                    <option value="new">Buat Repository Baru</option>
                    <option value="existing">Upload ke Repository Existing</option>
                </select>
            </div>

            <div class="form-group">
                <label>📤 Pilih File ZIP</label>
                <div class="file-input">
                    <div>📁 Drag & drop atau klik untuk pilih file</div>
                    <div style="font-size: 12px; color: #999; margin-top: 5px;">Hanya file .ZIP (Max 50MB)</div>
                    <input type="file" id="zipFile" accept=".zip" required>
                </div>
                <div class="file-name" id="fileName"></div>
            </div>

            <button type="submit" id="submitBtn">🚀 Upload ke GitHub</button>
        </form>

        <div id="progress">
            <div style="display: flex; justify-content: space-between; font-size: 14px;">
                <span id="statusText">Memproses...</span>
                <span id="progressText">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <div id="result"></div>
        <div class="footer">Made with ❤️ • GitHub API</div>
    </div>

    <script>
        // Event listener untuk menampilkan nama file
        document.getElementById('zipFile').addEventListener('change', function(e) {
            const fileName = this.files[0]?.name || 'Tidak ada file';
            const fileSize = this.files[0]?.size ? (this.files[0].size / 1024 / 1024).toFixed(2) + ' MB' : '';
            document.getElementById('fileName').textContent = `📎 ${fileName} ${fileSize}`;
        });

        // Cek file binary
        function isBinaryFile(filename) {
            const binaryExtensions = [
                '.png', '.jpg', '.jpeg', '.gif', '.bmp', '.ico', '.webp',
                '.pdf', '.zip', '.rar', '.7z', '.tar', '.gz',
                '.exe', '.dll', '.so', '.dylib', '.bin', '.dat',
                '.mp3', '.mp4', '.avi', '.mov', '.mkv', '.flv',
                '.doc', '.docx', '.xls', '.xlsx', '.ppt', '.pptx',
                '.woff', '.woff2', '.ttf', '.eot', '.otf'
            ];
            const lowerName = filename.toLowerCase();
            return binaryExtensions.some(ext => lowerName.endsWith(ext));
        }

        // Upload file ke GitHub
        async function uploadFileToGitHub(token, owner, repo, filePath, content) {
            const encodedPath = filePath.split('/').map(seg => encodeURIComponent(seg)).join('/');
            const url = `https://api.github.com/repos/${owner}/${repo}/contents/${encodedPath}`;
            
            // Cek file existing
            let sha = null;
            try {
                const checkRes = await fetch(url, {
                    headers: { 'Authorization': `token ${token}` }
                });
                if (checkRes.ok) {
                    const data = await checkRes.json();
                    sha = data.sha;
                }
            } catch (e) {}

            const response = await fetch(url, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: sha ? `Update ${filePath}` : `Add ${filePath}`,
                    content: content,
                    sha: sha
                })
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.message || 'Upload gagal');
            }

            return await response.json();
        }

        // Proses ZIP
        async function processZipFile(zipBuffer, token, owner, repo, mode, onProgress) {
            const JSZip = window.JSZip;
            const zip = await JSZip.loadAsync(zipBuffer);
            
            const fileList = [];
            zip.forEach((relativePath, zipEntry) => {
                if (!zipEntry.dir) {
                    fileList.push({ path: relativePath, entry: zipEntry });
                }
            });

            if (fileList.length === 0) {
                throw new Error('Tidak ada file dalam ZIP');
            }

            // Buat repo baru jika mode new
            if (mode === 'new') {
                const response = await fetch('https://api.github.com/user/repos', {
                    method: 'POST',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        name: repo,
                        private: false,
                        auto_init: false
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.message || 'Gagal membuat repository');
                }
            }

            let uploaded = 0;
            let failed = 0;
            const results = [];

            for (let i = 0; i < fileList.length; i++) {
                const { path: filePath, entry } = fileList[i];
                try {
                    const isBinary = isBinaryFile(filePath);
                    let content;
                    
                    if (isBinary) {
                        const arrayBuf = await entry.async('arraybuffer');
                        // Convert ArrayBuffer ke Base64
                        const bytes = new Uint8Array(arrayBuf);
                        let binary = '';
                        for (let j = 0; j < bytes.length; j++) {
                            binary += String.fromCharCode(bytes[j]);
                        }
                        content = btoa(binary);
                    } else {
                        const text = await entry.async('string');
                        content = btoa(text);
                    }

                    await uploadFileToGitHub(token, owner, repo, filePath, content);
                    uploaded++;
                    results.push({ path: filePath, status: 'success' });

                    // Update progress
                    if ((i + 1) % 3 === 0 || i === fileList.length - 1) {
                        onProgress(uploaded, fileList.length);
                    }

                } catch (err) {
                    failed++;
                    results.push({ path: filePath, status: 'failed', error: err.message });
                }
            }

            return { uploaded, failed, total: fileList.length, results };
        }

        // Handle form submit
        document.getElementById('uploadForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const token = document.getElementById('token').value.trim();
            const owner = document.getElementById('owner').value.trim();
            const repo = document.getElementById('repo').value.trim();
            const mode = document.getElementById('mode').value;
            const fileInput = document.getElementById('zipFile');
            const file = fileInput.files[0];

            // Validasi input
            if (!token || !owner || !repo || !file) {
                alert('Semua field harus diisi!');
                return;
            }

            if (!token.startsWith('ghp_') && !token.startsWith('github_pat_')) {
                alert('Token GitHub tidak valid! Harus dimulai dengan ghp_ atau github_pat_');
                return;
            }

            if (file.size > 50 * 1024 * 1024) {
                alert('File terlalu besar! Maksimal 50MB');
                return;
            }

            // UI elements
            const submitBtn = document.getElementById('submitBtn');
            const progressDiv = document.getElementById('progress');
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');
            const statusText = document.getElementById('statusText');
            const resultDiv = document.getElementById('result');

            // Reset UI
            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Uploading...';
            progressDiv.style.display = 'block';
            resultDiv.style.display = 'none';
            progressFill.style.width = '0%';
            progressText.textContent = '0%';
            statusText.textContent = '📤 Membaca file ZIP...';

            try {
                // Baca file ZIP
                const zipBuffer = await file.arrayBuffer();
                
                // Proses upload
                const result = await processZipFile(
                    zipBuffer, 
                    token, 
                    owner, 
                    repo, 
                    mode,
                    (uploaded, total) => {
                        const percent = Math.round((uploaded / total) * 100);
                        progressFill.style.width = percent + '%';
                        progressText.textContent = percent + '%';
                        statusText.textContent = `📤 Uploading ${uploaded}/${total} files`;
                    }
                );

                // Tampilkan hasil
                if (result.uploaded > 0) {
                    resultDiv.className = 'success';
                    resultDiv.style.display = 'block';
                    resultDiv.innerHTML = `
                        <strong>✅ Upload Berhasil!</strong><br>
                        📁 Total file: ${result.total}<br>
                        ✅ Berhasil: ${result.uploaded}<br>
                        ${result.failed > 0 ? `❌ Gagal: ${result.failed}<br>` : ''}
                        🔗 <a href="https://github.com/${owner}/${repo}" target="_blank">Lihat Repository</a>
                    `;
                    
                    // Tampilkan file yang gagal
                    if (result.failed > 0) {
                        const failedFiles = result.results.filter(r => r.status === 'failed');
                        let failedList = '<br><br><strong>File gagal:</strong><br>';
                        failedFiles.slice(0, 5).forEach(f => {
                            failedList += `▸ ${f.path}<br>`;
                        });
                        if (failedFiles.length > 5) {
                            failedList += `▸ dan ${failedFiles.length - 5} file lainnya`;
                        }
                        resultDiv.innerHTML += failedList;
                    }
                    
                    progressFill.style.width = '100%';
                    progressText.textContent = '100%';
                    statusText.textContent = '✅ Selesai!';
                } else {
                    throw new Error('Tidak ada file yang berhasil diupload');
                }

            } catch (error) {
                console.error('Error:', error);
                resultDiv.className = 'error';
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = `❌ Error: ${error.message}`;
                progressFill.style.width = '0%';
                progressText.textContent = '0%';
                statusText.textContent = '❌ Gagal';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '🚀 Upload ke GitHub';
            }
        });
    </script>
</body>
</html>
